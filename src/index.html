<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Generador de Dominios</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      text-align: center;
      padding: 40px;
    }

    h1 {
      color: #38bdf8;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      background: #38bdf8;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }

    ul {
      margin-top: 20px;
      list-style: none;
      padding: 0;
    }

    li {
      background: #1e293b;
      margin: 5px auto;
      padding: 10px;
      border-radius: 5px;
      width: 300px;
    }
  </style>
</head>
<body>

  <h1>🚀 Generador de Nombres de Dominio</h1>
  <button onclick="generarDominios()">Generar dominios</button>

  <ul id="lista"></ul>

  <script src="app.js"></script>
</body>
</html>
